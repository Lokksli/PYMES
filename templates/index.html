<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PYMES</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <h2>Simple Messenger</h2>
    <div class="container">
      <div class="main">
        <div>
          <label>Your username: </label>
          <input id="usernameInput" type="text" placeholder="Choose a username" />
          <button id="setUsername">Set</button>
          <span id="currentUsername">{{ username or 'not set' }}</span>
        </div>

        <div id="messages" aria-live="polite"></div>

        <div id="controls">
          <input id="messageInput" type="text" placeholder="Type a message" />
          <button id="send">Send</button>
        </div>
      </div>

      <aside class="sidebar">
        <h3>Users</h3>
        <div id="usersList">
        </div>
      </aside>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
